name: Eval Report Automation

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run"
        required: true
        default: "both"
        type: choice
        options:
          - unit
          - e2e
          - both
      num_repeats:
        description: "Repeat count per trace/case"
        required: true
        default: "5"
        type: string
      max_parallel:
        description: "Max parallel jobs"
        required: true
        default: "5"
        type: string
      sleep_between:
        description: "Sleep between analysis and eval phases (sec)"
        required: true
        default: "30"
        type: string
      container:
        description: "Container name used by eval scripts"
        required: false
        default: ""
        type: string
      issue_number:
        description: "Fix ticket issue number for ticket report comment"
        required: false
        default: ""
        type: string
      auto_create_issue:
        description: "Auto-create issue from fix ticket report when issue_number is empty"
        required: true
        default: false
        type: boolean
      issue_title:
        description: "Title for auto-created issue (optional)"
        required: false
        default: ""
        type: string
      issue_labels:
        description: "Comma-separated labels for auto-created issue"
        required: false
        default: ""
        type: string
      issue_assignee:
        description: "Assignee for auto-created issue (optional)"
        required: false
        default: ""
        type: string
      publish:
        description: "Publish reports to PR/issue comments"
        required: true
        default: true
        type: boolean
  pull_request:
    types: [labeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  eval-report-automation:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.label.name == 'run-eval-reports') }}
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight dependencies
        run: |
          python3 -m pip install --upgrade pip

      - name: Resolve run parameters
        id: params
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "suite=${{ inputs.suite }}" >> "$GITHUB_OUTPUT"
            echo "num_repeats=${{ inputs.num_repeats }}" >> "$GITHUB_OUTPUT"
            echo "max_parallel=${{ inputs.max_parallel }}" >> "$GITHUB_OUTPUT"
            echo "sleep_between=${{ inputs.sleep_between }}" >> "$GITHUB_OUTPUT"
            echo "container=${{ inputs.container }}" >> "$GITHUB_OUTPUT"
            echo "issue_number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "auto_create_issue=${{ inputs.auto_create_issue }}" >> "$GITHUB_OUTPUT"
            echo "issue_title=${{ inputs.issue_title }}" >> "$GITHUB_OUTPUT"
            echo "issue_labels=${{ inputs.issue_labels }}" >> "$GITHUB_OUTPUT"
            echo "issue_assignee=${{ inputs.issue_assignee }}" >> "$GITHUB_OUTPUT"
            echo "publish=${{ inputs.publish }}" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            echo "suite=both" >> "$GITHUB_OUTPUT"
            echo "num_repeats=5" >> "$GITHUB_OUTPUT"
            echo "max_parallel=5" >> "$GITHUB_OUTPUT"
            echo "sleep_between=30" >> "$GITHUB_OUTPUT"
            echo "container=" >> "$GITHUB_OUTPUT"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
            echo "auto_create_issue=true" >> "$GITHUB_OUTPUT"
            echo "issue_title=Eval Loop: Follow-up fixes (PR #${{ github.event.pull_request.number }})" >> "$GITHUB_OUTPUT"
            echo "issue_labels=eval-loop,automation" >> "$GITHUB_OUTPUT"
            echo "issue_assignee=" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run automated eval pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTAINER_FROM_VAR: ${{ vars.EVAL_CONTAINER }}
          CONTAINER_FROM_SECRET: ${{ secrets.EVAL_CONTAINER }}
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="gha_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          CONTAINER="${{ steps.params.outputs.container }}"
          if [[ -z "$CONTAINER" ]]; then
            CONTAINER="${CONTAINER_FROM_VAR:-}"
          fi
          if [[ -z "$CONTAINER" ]]; then
            CONTAINER="${CONTAINER_FROM_SECRET:-}"
          fi
          if [[ -z "$CONTAINER" ]]; then
            echo "CONTAINER is not set. Provide workflow input 'container' or set repo variable/secret EVAL_CONTAINER."
            exit 1
          fi

          CMD=(python3 evals/eval_scripts/run_eval_pipeline.py
            --suite "${{ steps.params.outputs.suite }}"
            --container "$CONTAINER"
            --num-repeats "${{ steps.params.outputs.num_repeats }}"
            --max-parallel "${{ steps.params.outputs.max_parallel }}"
            --sleep-between "${{ steps.params.outputs.sleep_between }}"
            --run-id "$RUN_ID"
          )

          if [[ "${{ steps.params.outputs.publish }}" == "true" ]]; then
            CMD+=(--publish)
          fi
          if [[ -n "${{ steps.params.outputs.pr_number }}" ]]; then
            CMD+=(--pr-number "${{ steps.params.outputs.pr_number }}")
          fi
          if [[ -n "${{ steps.params.outputs.issue_number }}" ]]; then
            CMD+=(--issue-number "${{ steps.params.outputs.issue_number }}")
          elif [[ "${{ steps.params.outputs.auto_create_issue }}" == "true" ]]; then
            CMD+=(--auto-create-issue)
            if [[ -n "${{ steps.params.outputs.issue_title }}" ]]; then
              CMD+=(--issue-title "${{ steps.params.outputs.issue_title }}")
            fi
            if [[ -n "${{ steps.params.outputs.issue_assignee }}" ]]; then
              CMD+=(--issue-assignee "${{ steps.params.outputs.issue_assignee }}")
            fi
            if [[ -n "${{ steps.params.outputs.issue_labels }}" ]]; then
              IFS=',' read -ra LABELS <<< "${{ steps.params.outputs.issue_labels }}"
              for label in "${LABELS[@]}"; do
                label="$(echo "$label" | xargs)"
                if [[ -n "$label" ]]; then
                  CMD+=(--issue-label "$label")
                fi
              done
            fi
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Upload eval report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            evals/eval_reports/gha_${{ github.run_id }}_${{ github.run_attempt }}
          if-no-files-found: error
