name: Build Wheel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Stamp dev version
        id: version
        run: |
          BASE_VERSION=$(python -c "import re; print(re.search(r'version=\"([^\"]+)\"', open('setup.py').read()).group(1))")
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE_STAMP=$(date +%Y%m%d)
          DEV_VERSION="${BASE_VERSION}.dev${DATE_STAMP}+g${SHORT_SHA}"
          echo "DEV_VERSION=${DEV_VERSION}" >> "$GITHUB_OUTPUT"
          sed -i "s/version=\"${BASE_VERSION}\"/version=\"${DEV_VERSION}\"/" setup.py

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: TraceLens-${{ steps.version.outputs.DEV_VERSION }}
          path: dist/*.whl
          retention-days: 90
