name: Protect Core TraceLens Files

on:
  pull_request:
    branches: [main]

jobs:
  check-protected-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check for protected file changes
        uses: actions/github-script@v7
        with:
          script: |
            const protectedDirectories = [
              'TraceLens/TreePerf/',
              'TraceLens/Trace2Tree/',
              'TraceLens/TraceDiff/',
              'TraceLens/TraceFusion/',
              'TraceLens/PerfModel/',
            ];

            const prBranch = context.payload.pull_request.head.ref;
            if (prBranch.startsWith('sync/upstream')) {
              console.log('PR is from upstream sync branch — allowing protected file changes.');
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 300,
            });

            const violations = files
              .map(f => f.filename)
              .filter(name => protectedDirectories.some(directory => name.startsWith(directory)));

            if (violations.length > 0) {
              core.setFailed(
                `These files can only be modified via upstream sync:\n${violations.map(f => `  - ${f}`).join('\n')}`
              );
            }