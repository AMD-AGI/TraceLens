name: tracelens_agent_evals

# Runs the pi-based Analysis eval harness inside Docker with a vLLM inference
# server on a SaFE GPU GitHub Actions runner. See:
# https://github.com/AMD-AGI/Primus-SaFE/blob/main/SaFE/docs/apis/cicd-quickstart.md
#
# Configure repository variable SAFE_GPU_RUNNER to the SaFE AutoscalingRunnerSet
# workloadId (the value used for `runs-on` in workflow YAML).

on:
  workflow_dispatch:
    inputs:
      tracelens_ref:
        description: TraceLens branch, tag, or SHA to evaluate
        required: false
        default: feat/gw_pi_evals
      comparison_scope:
        description: Eval comparison scope
        required: false
        default: comparative
        type: choice
        options:
          - comparative
          - standalone
      test_ids:
        description: Optional comma-separated test ID prefix filter (e.g. gemm_01)
        required: false
        default: ""
      num_repeats:
        description: Repeats per test case
        required: false
        default: "1"

concurrency:
  group: tracelens_agent_evals-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TRACELENS_REF: ${{ github.event.inputs.tracelens_ref || 'feat/gw_pi_evals' }}
  COMPARISON_SCOPE: ${{ github.event.inputs.comparison_scope || 'comparative' }}
  NUM_REPEATS: ${{ github.event.inputs.num_repeats || '1' }}
  TEST_IDS: ${{ github.event.inputs.test_ids }}

jobs:
  tracelens_agent_evals:
    name: tracelens_agent_evals (${{ env.COMPARISON_SCOPE }})
    # SaFE CICD: set vars.SAFE_GPU_RUNNER to your AutoscalingRunnerSet workloadId.
    runs-on: ${{ vars.SAFE_GPU_RUNNER }}
    timeout-minutes: 480

    steps:
      - name: Check out TraceLens (${{ env.TRACELENS_REF }})
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TRACELENS_REF }}
          fetch-depth: 1

      - name: Verify GPU and Docker
        run: |
          set -euo pipefail
          echo "Runner: $(hostname)"
          if command -v rocm-smi >/dev/null 2>&1; then
            rocm-smi || true
          elif command -v nvidia-smi >/dev/null 2>&1; then
            nvidia-smi || true
          else
            echo "WARNING: No rocm-smi or nvidia-smi found on PATH"
          fi
          docker info >/dev/null
          docker ps

      - name: Run pi analysis eval in Docker
        working-directory: ${{ github.workspace }}
        env:
          READY_TIMEOUT: "3600"
        run: |
          set -euo pipefail
          TRACELENS_ROOT="${GITHUB_WORKSPACE}"
          SCRIPT="${TRACELENS_ROOT}/agent_evals/Analysis/eval_scripts/run_pi_analysis_in_docker.sh"

          if [[ ! -x "$SCRIPT" ]]; then
            chmod +x "$SCRIPT"
          fi

          if [[ -n "${TEST_IDS:-}" ]]; then
            export TEST_IDS
          fi
          export NUM_REPEATS="${NUM_REPEATS}"

          bash "$SCRIPT" "$TRACELENS_ROOT" "$COMPARISON_SCOPE" -- \
            vllm serve Qwen/Qwen3.6-35B-A3B \
            --port 30000 \
            --tensor-parallel-size 8 \
            --max-model-len 262144 \
            --reasoning-parser qwen3 \
            --enable-auto-tool-choice \
            --tool-call-parser qwen3_coder

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracelens_agent_evals-${{ env.COMPARISON_SCOPE }}-${{ github.run_id }}
          path: |
            agent_evals/Analysis/repeatability_results_*/
            agent_evals/Analysis/reports_*/
          if-no-files-found: warn
