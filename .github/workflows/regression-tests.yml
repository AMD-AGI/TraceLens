name: Regression Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    # rocm-origami needs rocm
    container: rocm/dev-ubuntu-24.04:7.2.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          apt update && apt install -y python3-venv git
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install . pytest openpyxl orjson 'protobuf>=6.31.1,<7.0.0' rocm-origami

      - name: Configure runtime recording
        if: github.event_name == 'push'
        run: |
          mkdir -p .github/runtimes
          echo "JUNIT_FLAGS=--junitxml" >> $GITHUB_ENV

      - name: Run function-based tests
        run: |
          . .venv/bin/activate
          pytest tests/test_subtract_intervals.py tests/test_graph_mode.py tests/test_kernel_launchers.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/function-based.xml}

      - name: Run rocprof report tests
        run: |
          . .venv/bin/activate
          pytest tests/test_rocprof_perf_report.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/rocprof-report.xml}

      - name: Run perf report regression tests
        run: |
          . .venv/bin/activate
          pytest tests/test_perf_report_regression.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/perf-report-regression.xml}

      - name: Run compare perf reports tests
        run: |
          . .venv/bin/activate
          pytest tests/test_compare_perf_reports.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/compare-perf-reports.xml}

      - name: Run pytest on inference perf report tests
        run: |
          . .venv/bin/activate
          pytest tests/test_inference_perf_report.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/inference-perf-report.xml}

      - name: Run collective analysis tests
        run: |
          . .venv/bin/activate
          pytest tests/test_collective_analysis.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/collective-analysis.xml}

      - name: Run all2allv summary tests
        run: |
          . .venv/bin/activate
          pytest tests/test_all2allv_summary.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/all2allv-summary.xml}

      - name: Run JAX perf report tests
        run: |
          . .venv/bin/activate
          pytest tests/test_jax_perf_report.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/jax-perf-report.xml}

      - name: Run detect recompute tests
        run: |
          . .venv/bin/activate
          pytest tests/test_detect_recompute.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/detect-recompute.xml}

      - name: Run copyright header checks
        run: |
          . .venv/bin/activate
          pytest tests/test_copyright_headers.py \
            ${JUNIT_FLAGS:+$JUNIT_FLAGS=.github/runtimes/copyright-headers.xml}

      - name: Push metrics to Grafana Cloud
        if: always() && github.event_name == 'push'
        env:
          GRAFANA_CLOUD_OTLP_ENDPOINT: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}
          GRAFANA_CLOUD_OTLP_TOKEN: ${{ secrets.GRAFANA_CLOUD_OTLP_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          . .venv/bin/activate
          pip install \
            opentelemetry-sdk \
            opentelemetry-exporter-otlp-proto-http
          python3 .github/scripts/push_metrics.py .github/runtimes/
