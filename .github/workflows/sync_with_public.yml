name: Sync from upstream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [public-sync]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream changes
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/AMD-AGI/TraceLens.git
          git fetch upstream main

          if git diff --quiet HEAD..upstream/main; then
            echo "No changes to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit --strategy-option theirs

          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          gh pr create \
            --title "Sync from public TraceLens repo" \
            --body "Automated sync from public TraceLens repo: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            --head "$BRANCH" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}